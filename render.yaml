# Configuration de déploiement pour Render (https://render.com)
services:
  - type: web
    name: mpp-predictor
    runtime: python
    plan: free
    buildCommand: |
      pip install -r requirements.txt
      pip install -e .
      curl -sL https://raw.githubusercontent.com/martj42/international_results/master/results.csv -o data/raw/results.csv
    # 1 worker, timeout généreux, port lié immédiatement.
    startCommand: gunicorn web.app:app --bind 0.0.0.0:$PORT --workers 1 --timeout 300 --graceful-timeout 60
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
