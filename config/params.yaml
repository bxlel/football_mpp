# =============================================================================
# MPP Predictor — Paramètres du modèle
# =============================================================================
# Toutes les constantes "magiques" du modèle vivent ici, pas dans le code.
# Principe Ockham : peu de paramètres, tous justifiés, tous ajustables sans
# toucher à une ligne de Python.

attack_index:
  # Pondérations des 3 critères de l'Index d'Attaque. Doivent sommer à 1.0
  # (validé au chargement).
  weights:
    dynamics: 0.50      # D — dynamique offensive récente
    freshness: 0.30     # F — fraîcheur / charge des cadres offensifs
    context: 0.20       # C — ajustement contextuel (météo, repos, enjeu)

  dynamics:
    n_recent_matches: 8         # fenêtre glissante de matchs considérés
    time_decay_lambda: 0.95     # amortissement par récence (recalibré sur 3 tournois)
    use_opponent_strength: true # pondérer par la force adverse (Elo)

  freshness:
    # Plateau de forme : rendement maximal sur l'INTERVALLE [optimal_low, optimal_high],
    # puis chute des deux côtés (sous-régime / fatigue). sigma = largeur des pentes.
    optimal_low: 30
    optimal_high: 45
    sigma: 12.0
    key_players_count: 5    # nb de cadres offensifs pris en compte

  context:
    # Multiplicateur centré sur 1.0, borné pour éviter les valeurs extrêmes.
    min_factor: 0.85
    max_factor: 1.15

defense_index:
  # Structure miroir de l'attaque.
  weights:
    dynamics: 0.50
    freshness: 0.30
    context: 0.20

  dynamics:
    n_recent_matches: 8
    time_decay_lambda: 0.95
    use_opponent_strength: true

  freshness:
    optimal_low: 30
    optimal_high: 45
    sigma: 12.0
    key_players_count: 5

  context:
    min_factor: 0.85
    max_factor: 1.15

poisson:
  max_goals: 8   # taille de la matrice de scores (0..8 par équipe)
  dixon_coles_rho: -0.03   # correction scores serrés (recalibré)
  base_goals: 1.05   # niveau de buts (calibré sur 3 tournois)
  nb_dispersion: 0.12   # sur-dispersion Binomiale Négative (calibré sur 3 tournois)
  draw_boost: 1.05   # léger coup de pouce aux scores nuls (validé sur 3 tournois)

elo:
  # Intensité de l'effet Elo sur l'espérance de buts. 0 = pas d'effet Elo,
  # valeur plus haute = l'écart de force pèse plus lourd. Calibré sur backtest.
  strength: 0.40
  # Avantage du terrain appliqué à la PRÉDICTION. 0 pour la Coupe du Monde car
  # les matchs se jouent sur terrain neutre (calibré : +5 pts au backtest).
  prediction_home_advantage: 0

# Barème de points Mon Petit Prono (à ajuster selon ta ligue).
mpp_scoring:
  exact_score: 3        # score exact trouvé
  goal_difference: 2    # bonne différence de buts (mais pas score exact)
  correct_outcome: 1    # bon résultat (1/N/2) seulement
